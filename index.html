function Badge({ type, children }) {
  const c = { info: { bg: "#E3F2FD", c: "#1565C0" }, warn: { bg: "#FFF3E0", c: "#E65100" }, danger: { bg: "#FFEBEE", c: "#C62828" }, success: { bg: "#E8F5E9", c: "#2E7D32" }, teal: { bg: TL, c: T } }[type] || { bg: TL, c: T };
  return <span style={{ display: "inline-block", fontSize: 11, padding: "3px 10px", borderRadius: 6, background: c.bg, color: c.c, fontWeight: 600 }}>{children}</span>;
}

function Alert({ type, children }) {
  const c = { info: { bg: "#E3F2FD", c: "#1565C0", b: "#90CAF9" }, warn: { bg: "#FFF3E0", c: "#E65100", b: "#FFCC80" }, danger: { bg: "#FFEBEE", c: "#C62828", b: "#EF9A9A" } }[type] || { bg: "#E3F2FD", c: "#1565C0", b: "#90CAF9" };
  return <div style={{ padding: "12px 14px", borderRadius: 10, background: c.bg, color: c.c, fontSize: 14, lineHeight: 1.5, marginBottom: 12, borderLeft: `3px solid ${c.b}` }}>{children}</div>;
}

function Card({ children, style }) {
  return <div style={{ background: "white", borderRadius: 14, padding: "16px 18px", marginBottom: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", ...style }}>{children}</div>;
}

function Metric({ label, value, small }) {
  return (
    <div style={{ background: "#F7F8FA", borderRadius: 10, padding: "12px 14px", flex: "1 1 45%", minWidth: 0 }}>

      <div style={{ fontSize: small ? 14 : 20, fontWeight: 600, marginTop: 2, color: "#1A1D23" }}>{value}</div>
    </div>
  );
}

          padding: "8px 14px", borderRadius: 20, border: "none", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0,

      ))}
    </div>
  );
}

function Expandable({ title, children, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen || false);
  return (
    <div style={{ borderBottom: "1px solid #F0F1F3", paddingBottom: open ? 12 : 0, marginBottom: 8 }}>
      <div onClick={() => setOpen(!open)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", cursor: "pointer", WebkitTapHighlightColor: "transparent" }}>
        <span style={{ fontSize: 15, fontWeight: 500, flex: 1, paddingRight: 8 }}>{title}</span>
        <span style={{ fontSize: 18, color: "#9CA3AF", transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s", flexShrink: 0 }}>▾</span>
      </div>
      {open && <div style={{ paddingBottom: 4 }}>{children}</div>}
    </div>
  );
}

function PackTab() {
  const [checked, setChecked] = useState(() => {
    const s = {};
    Object.keys(CHECKLIST_DATA).forEach(cat => { CHECKLIST_DATA[cat].items.forEach((_, i) => { s[`${cat}-${i}`] = false; }); });
    return s;
  });
  const toggle = (k) => setChecked(p => ({ ...p, [k]: !p[k] }));
  const total = Object.keys(checked).length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);

  return (
    <div style={{ padding: "20px 16px" }}>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Packing checklist</div>
      <div style={{ fontSize: 13, color: "#9CA3AF", marginBottom: 14 }}>Tap items to check them off</div>
      <div style={{ background: "#F7F8FA", borderRadius: 12, padding: "14px 16px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 14, fontWeight: 600 }}>{done} of {total} packed</span>
          <span style={{ fontSize: 14, fontWeight: 700, color: pct === 100 ? "#2E7D32" : T }}>{pct}%</span>
        </div>
        <div style={{ height: 6, borderRadius: 3, background: "#E0E3E8", overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 3, background: pct === 100 ? "#2E7D32" : T, width: `${pct}%`, transition: "width 0.3s ease" }} />
        </div>
      </div>
      {Object.entries(CHECKLIST_DATA).map(([catKey, cat]) => (
        <Card key={catKey}>
          <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 10 }}>{cat.title}</div>
          {cat.items.map((item, i) => {
            const key = `${catKey}-${i}`;
            const isDone = checked[key];
            return (
              <div key={key} onClick={() => toggle(key)} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "12px 0",
                borderTop: i ? "1px solid #F0F1F3" : "none", cursor: "pointer", WebkitTapHighlightColor: "transparent",
              }}>
                <div style={{
                  width: 24, height: 24, borderRadius: 6, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s",
                  background: isDone ? T : "white", border: isDone ? `2px solid ${T}` : "2px solid #D1D5DB",
                }}>
                  {isDone && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span style={{ fontSize: 15, color: isDone ? "#9CA3AF" : "#374151", textDecoration: isDone ? "line-through" : "none", transition: "all 0.15s" }}>{item}</span>
              </div>
            );
          })}
        </Card>
      ))}
    </div>
  );
}

function FlightsTab() {
  const [view, setView] = useState("arrivals");
  const [search, setSearch] = useState("");
  const q = search.toLowerCase();
  const data = view === "arrivals" ? ARRIVALS : DEPARTURES;

  const filteredData = data.map(dayGroup => ({
    ...dayGroup,
    flights: dayGroup.flights.filter(f => !q || f.passengers.some(p => p.toLowerCase().includes(q)))
  })).filter(dayGroup => dayGroup.flights.length > 0);

  return (
    <div style={{ padding: "20px 16px" }}>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Flight manifest</div>
      <div style={{ fontSize: 13, color: "#9CA3AF", marginBottom: 14 }}>See who's on your flight and transport groupings</div>
      <PillNav items={[{ key: "arrivals", label: "Arrivals" }, { key: "departures", label: "Departures" }]} active={view} onSelect={(v) => { setView(v); setSearch(""); }} />
      <input type="text" placeholder="Search your name..." value={search} onChange={e => setSearch(e.target.value)}
        style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1.5px solid #E0E3E8", fontSize: 16, marginBottom: 16, background: "white", boxSizing: "border-box", outline: "none" }} />
      {view === "departures" && <Alert type="info">Pickup times are estimated at 3 hours before departure. Final times will be confirmed via email and #2026-pclub Slack.</Alert>}
      {filteredData.length === 0 && <div style={{ textAlign: "center", padding: "40px 20px", color: "#9CA3AF", fontSize: 14 }}>No flights found for "{search}"</div>}
      {filteredData.map((dayGroup, di) => (
        <div key={di} style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: T, marginBottom: 10, padding: "8px 0", borderBottom: `2px solid ${T}22` }}>{dayGroup.date}</div>
          {dayGroup.flights.map((f, fi) => (
            <Card key={fi} style={q && f.passengers.some(p => p.toLowerCase().includes(q)) ? { border: `2px solid ${T}`, boxShadow: `0 0 0 3px ${T}22` } : {}}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 6 }}>
                <div style={{ fontSize: 16, fontWeight: 600 }}>{f.route}</div>
                <Badge type={f.stops === "Non-stop" ? "success" : "teal"}>{f.stops}</Badge>
              </div>
              <div style={{ fontSize: 13, color: "#6B7280", marginBottom: 2 }}>{f.airline}</div>
              <div style={{ display: "flex", gap: 16, fontSize: 14, margin: "8px 0" }}>
                <div><span style={{ color: "#9CA3AF", fontSize: 12 }}>Departs </span><span style={{ fontWeight: 600 }}>{f.departs}</span></div>
                <div><span style={{ color: "#9CA3AF", fontSize: 12 }}>Arrives </span><span style={{ fontWeight: 600 }}>{f.arrives}</span></div>
              </div>
              {f.pickup && <div style={{ fontSize: 13, fontWeight: 600, color: "#E65100", background: "#FFF3E0", display: "inline-block", padding: "3px 10px", borderRadius: 6, marginBottom: 8 }}>Hotel pickup {f.pickup}</div>}
              <div style={{ borderTop: "1px solid #F0F1F3", paddingTop: 8, marginTop: 4 }}>
                <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 4 }}>{f.passengers.length} traveler{f.passengers.length !== 1 ? "s" : ""}</div>
                <div style={{ fontSize: 14, lineHeight: 1.7 }}>
                  {f.passengers.map((p, pi) => (
                    <span key={pi}>
                      <span style={q && p.toLowerCase().includes(q) ? { background: "#FFF176", padding: "1px 4px", borderRadius: 4, fontWeight: 600 } : {}}>{p}</span>
                      {pi < f.passengers.length - 1 && <span style={{ color: "#D1D5DB" }}> · </span>}
                    </span>
                  ))}
                </div>
              </div>
            </Card>
          ))}
        </div>
      ))}
    </div>
  );
}

function RosterTab() {
  const [search, setSearch] = useState("");
  const q = search.toLowerCase();
  const teamOrder = ["F&E GUB", "MM GUB", "Insurance", "Cross-Functional", "Leadership"];

  return (
    <div style={{ padding: "20px 16px" }}>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Who's going</div>
      <div style={{ fontSize: 13, color: "#9CA3AF", marginBottom: 14 }}>The full President's Club roster by segment</div>
      <input type="text" placeholder="Search by name, role, or team..." value={search} onChange={e => setSearch(e.target.value)}
        style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1.5px solid #E0E3E8", fontSize: 16, marginBottom: 16, background: "white", boxSizing: "border-box", outline: "none" }} />
      <div style={{ fontSize: 13, color: "#9CA3AF", marginBottom: 12 }}>{filteredRoster.length} attendee{filteredRoster.length !== 1 ? "s" : ""}</div>
      {teamOrder.map(team => {
        const members = filteredRoster.filter(r => r.team === team);
        if (members.length === 0) return null;
        return (
          <div key={team} style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: T, marginBottom: 10, padding: "8px 0", borderBottom: `2px solid ${T}22` }}>{team}</div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "0 0 6px", marginBottom: 4 }}>
              <div style={{ fontSize: 11, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 0.5, flex: 1, paddingLeft: 52 }}>Attendee</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: 0.5, flexShrink: 0, textAlign: "right" }}>Guest</div>
            </div>
            {members.map((r, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderTop: i ? "1px solid #F0F1F3" : "1px solid #F0F1F3" }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: TL, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 600, color: T, flexShrink: 0 }}>
                  {r.name.split(" ").map(w => w[0]).join("")}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>
                    <span style={q && r.name.toLowerCase().includes(q) ? { background: "#FFF176", padding: "1px 4px", borderRadius: 4 } : {}}>{r.name}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#6B7280" }}>{r.role}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0, maxWidth: "40%" }}>
                  {r.guest !== "—" ? (
                    <div style={{ fontSize: 13, color: "#374151" }}>
                      <span style={q && r.guest.toLowerCase().includes(q) ? { background: "#FFF176", padding: "1px 4px", borderRadius: 4 } : {}}>{r.guest}</span>
                    </div>
                  ) : (
                    <div style={{ fontSize: 12, color: "#D1D5DB" }}>—</div>
                  )}

            ))}
          </div>
        );
      })}
    </div>
  );
}

function useIsWide() {
  const [wide, setWide] = useState(typeof window !== 'undefined' && window.innerWidth >= 768);
  React.useEffect(() => {
    const handler = () => setWide(window.innerWidth >= 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return wide;
}

  return (

        zIndex: 100, maxWidth: 480, margin: "0 auto",
      }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => { setTab(t.id); window.scrollTo(0, 0); }} style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 2, border: "none", background: "none", cursor: "pointer", padding: "4px 12px", minWidth: 56,

}
